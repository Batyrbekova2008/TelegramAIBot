name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/telegram-ai-bot
  PYTHON_VERSION: "3.12"

jobs:

  # ── Stage 1: Linting ─────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff mypy types-redis

      - name: ruff check
        run: ruff check . --select E,W,F,I --ignore E501

      - name: mypy (non-strict, main modules only)
        run: |
          pip install -r requirements.txt
          mypy config/ services/ handlers/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true   # non-blocking for now

  # ── Stage 2: Security scan ────────────────────────────────────────────────────
  security:
    name: Security scan (bandit + safety)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit safety

      - name: bandit (medium+ severity)
        run: bandit -r . -ll -x venv,tests --skip B101,B601

      - name: safety check
        run: safety check -r requirements.txt --ignore 70612
        continue-on-error: true   # some CVEs are low-risk

  # ── Stage 3: Unit + Integration tests ────────────────────────────────────────
  test:
    name: Tests (pytest + coverage)
    runs-on: ubuntu-latest
    env:
      TELEGRAM_TOKEN: "0000000000:AAFakeTokenForTestingPurposesOnly"
      GROQ_API_KEY: "gsk_fakekeyfakekey123456789fakekey"
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: chat-bot

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/ \
            --ignore=tests/test_property_based.py \
            --cov=services --cov=handlers --cov=config \
            --cov-report=xml --cov-report=term-missing \
            -v

      - name: Check coverage >= 70%
        run: |
          coverage report --fail-under=70 || echo "Coverage below 70% — check report"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  # ── Stage 4: Build Docker image ───────────────────────────────────────────────
  build:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

  # ── Stage 5: Deploy to staging ───────────────────────────────────────────────
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/telegram-ai-bot
            docker compose pull bot
            docker compose up -d bot
            echo "Deployed to staging"

      - name: Smoke test
        run: |
          sleep 10
          curl -f ${{ secrets.STAGING_URL }}/health || echo "Smoke test failed"
        continue-on-error: true

  # ── Stage 6: Deploy to production (manual approval) ──────────────────────────
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment: production   # requires manual approval in GitHub

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/telegram-ai-bot
            docker compose pull bot
            docker compose up -d bot
            echo "Deployed to production"

      - name: Production smoke test
        run: |
          sleep 15
          curl -f ${{ secrets.PROD_URL }}/health || echo "Production smoke test failed"
        continue-on-error: true
